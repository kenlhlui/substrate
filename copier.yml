_subdirectory: template

project_type:
  type: str
  help: Is this project a package, an app or a data project?
  choices:
    - app
    - package
    - data project
  default: package

data_project_dirs:
  type: bool
  help: Do you want to create the standard data project directories (data, config)?
  default: true
  when: "{{ project_type == 'data project' }}"

with_pypi_publish:
  type: bool
  help: Do you want to publish to PyPI?
  default: true
  when: "{{ project_type == 'package' }}"

project_name:
  type: str
  help: What is your {{ project_type }}'s name?
  placeholder: "{% if project_type == 'app' %}My App{% else %}My Package{% endif %}"
  validator: >-
    {% if not project_name.strip() %}
    Invalid project name
    {% endif %}

project_description:
  type: str
  help: What does your {{ project_type }} do in one sentence?
  placeholder: A Python {{ project_type }} that reticulates splines.
  validator: >-
    {% if not project_description.strip() %}
    Invalid project description
    {% endif %}

project_url:
  type: str
  help: What is the URL of your project's repository?
  default: "https://github.com/kenlhlui/{{ project_name | lower | replace(' ', '-') }}"
  placeholder: https://github.com/kenlhlui/{{ project_type }}
  validator: >-
    {% if not project_url.startswith("https://") %}
    Invalid project URL
    {% endif %}

python_version:
  type: str
  help: "{% if project_type == 'app' %}Which Python version should your app use?{% else %}What is the minimum Python version your package should support?{% endif %}"
  choices:
    - "3.10"
    - "3.11"
    - "3.12"
    - "3.13"
  default: "{% if project_type == 'app' %}3.13{% else %}3.12{% endif %}"

ci:
  type: str
  help: Which CI/CD provider would you like to use?
  choices:
    GitHub Actions: github
    GitLab CI/CD: gitlab
  default: "{% if 'github' in project_url %}github{% else %}gitlab{% endif %}"
  when: "{{ 'github' not in project_url and 'gitlab' not in project_url }}"

typing:
  type: str
  help: Do you want to use optional or strict typing and linting?
  choices:
    - optional
    - strict
  default: optional

version_scheme:
  type: str
  help: Which versioning scheme do you want to use?
  choices:
    - pep440
    - semver
    - semver2
  default: pep440

with_conventional_commits:
  type: bool
  help: Do you want to follow the Conventional Commits standard (https://www.conventionalcommits.org) for your commit messages?
  default: true

with_fastapi_api:
  type: bool
  help: Does your app need a FastAPI API?
  default: false
  when: "{{ project_type == 'app' }}"

with_typer_cli:
  type: bool
  help: Does your {{ project_type }} need a Typer CLI?
  default: false

with_pydantic:
  type: bool
  help: Does your {{ project_type }} need Pydantic for data validation?
  default: true

with_httpx2:
  type: bool
  help: Does your {{ project_type }} need HTTPX2 for making HTTP requests?
  default: true

project_name_kebab_case:
  when: false
  default: "{{ project_name | lower | replace(' ', '-') }}"

project_name_snake_case:
  when: false
  default: "{{ project_name | lower | replace(' ', '_') | replace('-', '_') }}"

documentation_url:
  when: false
  default: "{% if ci == 'github' %}https://{{ project_url.rstrip('/').split('/')[-2] }}.github.io/{{ project_url.rstrip('/').split('/')[-1] }}{% else %}{{ project_url }}{% endif %}"
